<mat-tab-group>
    <mat-tab label="Editar">
        <mat-form-field appearance="fill"> 
            <mat-label>
                {{placeHolderTextArea}}
            </mat-label>
            <textarea matInput [(ngModel)]="contenidMarkdown" (change)="changeMarkdown.emit($event.target.value)"></textarea>
        </mat-form-field>
    </mat-tab>

    <mat-tab label="Preview">
        <markdown [data]="contenidMarkdown" ngPreserveWhitespaces></markdown>
    </mat-tab>
</mat-tab-group>
